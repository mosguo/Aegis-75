services:
  - name: aegis-control-hk
    source: .
    dockerfile: Dockerfile
    env:
      AEGIS_ROLE: control-plane
      AEGIS_BYOH_ENABLED: "false"
      AEGIS_HOST_CLASS: cloud
      AEGIS_HUB_MODE: edge
      AEGIS_DEPLOYMENT_TARGET: zeabur
      AEGIS_FUTURE_DEPLOYMENT_TARGET: zeabur
      AEGIS_NODE_ID: hk-01
      AEGIS_RUNTIME_HOST_ID: zb-hk-01
      AEGIS_LOGICAL_HOST_ID: hk-01
      AEGIS_LOGICAL_SITE: hk-edge
      AEGIS_REGION: ap-east-1
      AEGIS_CLUSTER: global-8
      AEGIS_EXECUTION_MODE: paper
  - name: aegis-trading-tk
    source: .
    dockerfile: Dockerfile
    env:
      AEGIS_ROLE: trading-unit
      AEGIS_BYOH_ENABLED: "false"
      AEGIS_HOST_CLASS: cloud
      AEGIS_HUB_MODE: edge
      AEGIS_DEPLOYMENT_TARGET: zeabur
      AEGIS_FUTURE_DEPLOYMENT_TARGET: zeabur
      AEGIS_NODE_ID: tk-01
      AEGIS_RUNTIME_HOST_ID: zb-tk-01
      AEGIS_LOGICAL_HOST_ID: tk-01
      AEGIS_LOGICAL_SITE: tokyo-edge
      AEGIS_REGION: ap-northeast-1
      AEGIS_CLUSTER: global-8
      AEGIS_EXECUTION_MODE: paper
  - name: aegis-byoh-profile
    source: .
    dockerfile: Dockerfile
    env:
      AEGIS_ROLE: hybrid
      AEGIS_BYOH_ENABLED: "true"
      AEGIS_HOST_CLASS: byoh
      AEGIS_HUB_MODE: data-execution-hub
      AEGIS_DEPLOYMENT_TARGET: zeabur
      AEGIS_FUTURE_DEPLOYMENT_TARGET: byoh
      AEGIS_MIGRATION_STAGE: zeabur-validation-before-byoh-cutover
      AEGIS_ZEABUR_COMPATIBLE: "true"
      AEGIS_BYOH_CUTOVER_READY: "false"
      AEGIS_IDENTITY_SOURCE: environment
      AEGIS_NODE_ID: byoh-hub-01
      AEGIS_RUNTIME_HOST_ID: zb-byoh-hub-01
      AEGIS_LOGICAL_HOST_ID: byoh-hub-01
      AEGIS_LOGICAL_SITE: cht-lab-core
      AEGIS_PHYSICAL_HOST_PLANNED: "true"
      AEGIS_PHYSICAL_HOST_ID: ""
      AEGIS_REGION: private-dc-profile
      AEGIS_CLUSTER: global-8
      AEGIS_EXECUTION_MODE: paper
      AEGIS_SIGNING_MODE: local-env
